<!DOCTYPE html>
<html>
<head>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

.slideshow {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

.slideshow .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    animation: fadeAnimation 18s infinite;
}

.slideshow .slide:nth-child(1) {
    animation-delay: 0s;
}

.slideshow .slide:nth-child(2) {
    animation-delay: 6s;
}

.slideshow .slide:nth-child(3) {
    animation-delay: 12s;
}

@keyframes fadeAnimation {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    30%  { opacity: 1; }
    40%  { opacity: 0; }
    100% { opacity: 0; }
}
</style>
</head>
<body>
<div class="slideshow">
    <img src="image1.png" class="slide">
    <img src="image2.png" class="slide">
    <img src="image3.png" class="slide">
</div>
</body>
</html>
